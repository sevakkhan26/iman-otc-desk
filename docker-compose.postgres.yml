# Optional PostgreSQL service for the OTC desk (local / Ubuntu).
#
# Usage (local or server — does NOT auto-modify production):
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# Port 5432 is bound to 127.0.0.1 only (not public).
# Credentials via environment / .env — never commit secrets.

services:
  otc-postgres:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}
    container_name: otc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-otc_desk}
      POSTGRES_USER: ${POSTGRES_USER:-otc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - otc-postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-app-role.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      # Bind localhost only — never expose publicly
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - otc-net

  iman-otc-desk:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-otc_app}:${POSTGRES_PASSWORD}@otc-postgres:5432/${POSTGRES_DB:-otc_desk}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      # Obsolete file/redis backends — left unset intentionally
    depends_on:
      otc-postgres:
        condition: service_healthy
    networks:
      - otc-net

networks:
  otc-net:
    name: otc-net

volumes:
  otc-postgres-data:
    name: otc-postgres-data
