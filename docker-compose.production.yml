# Optional override when this repo is composed from an external parent directory.
# Example (from /home/server/docker-projects):
#   docker compose -f docker-compose.yml -f /path/to/iman-otc-desk/docker-compose.production.yml up -d --build
#
# Prefer using this repository's docker-compose.yml directly after one-time alignment.

services:
  iman-otc-desk:
    environment:
      PRICE_ALERTS_STORAGE: file
      PRICE_ALERTS_DATA_DIR: /app/data/price-alerts
      PRICE_ALERTS_DATA_FILE: /app/data/price-alerts/price-alerts.json
      VIEWER_AUTH_DATA_FILE: /app/data/price-alerts/viewer-auth.json
      # Never use host.docker.internal for Postgres (Docker Desktop CONNECT_TIMEOUT → 503).
      OTC_FORCE_COMPOSE_DB: "1"
      OTC_DB_HOST: otc-postgres
      OTC_DB_PORT: "5432"
    volumes:
      - iman-otc-alerts-data:/app/data/price-alerts

volumes:
  iman-otc-alerts-data:
    name: iman-otc-alerts-data
